    // ── 지도 초기화 ──
    const mapContainer = document.getElementById('map');
    const mapOption = {
        center: new kakao.maps.LatLng(35.84, 127.1),
        level: 10,
    };
    const map = new kakao.maps.Map(mapContainer, mapOption);

    // 지도 컨트롤
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
    map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

    // ── 행정동 경계선 (회색) 그리기 ──
    function drawAdminBoundaries() {
        ADMIN_ZONES.forEach(geom => {
            const rings = geom.type === 'MultiPolygon' ? geom.coordinates.flat() : geom.coordinates;
            rings.forEach(ring => {
                const path = ring.map(c => new kakao.maps.LatLng(c[1], c[0]));
                new kakao.maps.Polygon({
                    map: map,
                    path: path,
                    strokeWeight: 1,
                    strokeColor: '#666666',
                    strokeOpacity: 0.4,
                    strokeStyle: 'solid',
                    fillColor: '#cccccc',
                    fillOpacity: 0.15,
                });
            });
        });
    }

    // ── 센터 관할 구역 (색상) 그리기 ──
    function drawCenterZones() {
        CENTER_ZONES.forEach(zone => {
            const geom = zone.geometry;
            const rings = geom.type === 'MultiPolygon' ? geom.coordinates.flat() : geom.coordinates;
            rings.forEach(ring => {
                const path = ring.map(c => new kakao.maps.LatLng(c[1], c[0]));
                const polygon = new kakao.maps.Polygon({
                    map: map,
                    path: path,
                    strokeWeight: 2,
                    strokeColor: zone.color,
                    strokeOpacity: 0.8,
                    strokeStyle: 'solid',
                    fillColor: zone.color,
                    fillOpacity: 0.35,
                });

                // 마우스 호버 효과
                kakao.maps.event.addListener(polygon, 'mouseover', function() {
                    polygon.setOptions({ fillOpacity: 0.55, strokeWeight: 3 });
                });
                kakao.maps.event.addListener(polygon, 'mouseout', function() {
                    polygon.setOptions({ fillOpacity: 0.35, strokeWeight: 2 });
                });
            });
        });
    }

    // ── 카카오 Geocoder로 주소 → 좌표 변환 후 마커 배치 ──
    const geocoder = new kakao.maps.services.Geocoder();
    let geocodedCount = 0;
    const markers = [];
    const overlays = [];


    function geocodeAndPlaceMarkers() {
        const progressEl = document.getElementById('loadingProgress');

        CENTERS.forEach((center, idx) => {
            geocodedCount++;
            progressEl.textContent = `위치 불러오는 중... (${geocodedCount} / ${CENTERS.length})`;
            
            let lat = center.lat;
            let lng = center.lng;
            console.log(`✅ ${center.name}: 고정 좌표 사용 (${lat}, ${lng})`);


                const position = new kakao.maps.LatLng(lat, lng);

                // 흰색 원형 마커 (CircleOverlay)
                const circleContent = `
                    <div style="
                        width: 16px; height: 16px;
                        background: white;
                        border: 3px solid ${center.color};
                        border-radius: 50%;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
                    "></div>
                `;
                const circleOverlay = new kakao.maps.CustomOverlay({
                    map: map,
                    position: position,
                    content: circleContent,
                    yAnchor: 0.5,
                    xAnchor: 0.5,
                    zIndex: 3,
                });

                // 센터 이름 라벨
                const labelContent = `<div class="center-label" style="border-color: ${center.color}">${center.name}</div>`;
                const labelOverlay = new kakao.maps.CustomOverlay({
                    map: map,
                    position: position,
                    content: labelContent,
                    yAnchor: 2.2,
                    xAnchor: 0.5,
                    zIndex: 4,
                });

                // 클릭 시 정보 팝업
                const infoContent = `
                    <div class="info-popup">
                        <div class="popup-title" style="color: ${center.color}">🚒 ${center.name}</div>
                        <div class="popup-addr">📍 ${center.address}</div>
                    </div>
                `;
                const infoOverlay = new kakao.maps.CustomOverlay({
                    position: position,
                    content: infoContent,
                    yAnchor: 3.8,
                    xAnchor: 0.5,
                    zIndex: 5,
                });

                // 원 클릭 → 정보 토글
                let infoVisible = false;
                const clickArea = new kakao.maps.CustomOverlay({
                    map: map,
                    position: position,
                    content: `<div style="width:24px;height:24px;cursor:pointer;" id="click_${center.id}"></div>`,
                    yAnchor: 0.5,
                    xAnchor: 0.5,
                    zIndex: 6,
                });
                // 클릭 이벤트는 CustomOverlay의 DOM에 직접 바인딩
                setTimeout(() => {
                    const el = document.getElementById(`click_${center.id}`);
                    if (el) {
                        el.addEventListener('click', () => {
                            if (infoVisible) {
                                infoOverlay.setMap(null);
                            } else {
                                // 다른 팝업 닫기
                                overlays.forEach(o => o.setMap(null));
                                infoOverlay.setMap(map);
                            }
                            infoVisible = !infoVisible;
                        });
                    }
                }, 500);

                overlays.push(infoOverlay);

                // 모든 센터 처리 완료 시 로딩 해제
                if (geocodedCount === CENTERS.length) {
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').classList.add('hidden');
                    }, 400);
                }
        });
    }

    // ── 범례 생성 ──
    function buildLegend() {
        const container = document.getElementById('legendItems');
        // 그룹별 정렬
        const groups = {};
        CENTERS.forEach(c => {
            if (!groups[c.group]) groups[c.group] = [];
            groups[c.group].push(c);
        });

        for (const [groupName, members] of Object.entries(groups)) {
            const groupHeader = document.createElement('div');
            groupHeader.style.cssText = 'font-size:11px; color:#8080a0; margin-top:8px; margin-bottom:3px; font-weight:600;';
            groupHeader.textContent = `── ${groupName} ──`;
            container.appendChild(groupHeader);

            members.forEach(c => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background:${c.color}"></div>
                    <span class="legend-label">${c.name}</span>
                `;
                container.appendChild(item);
            });
        }
    }

    // ── 실행 ──
    drawAdminBoundaries();
    drawCenterZones();
    geocodeAndPlaceMarkers();
    buildLegend();

}); // kakao.maps.load 끝
</script>

</body>
</html>
